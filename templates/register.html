{% extends "base.html" %}

{% block title %}Sign Up - PathFinder AI{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glassmorphic animate-fade-in">
        <div class="auth-header">
            <h2>Create Account</h2>
            <p>Begin your AI-powered career exploration today</p>
        </div>
        
        <form action="{{ url_for('register') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Choose a username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fa-solid fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required autocomplete="new-password">
            </div>
            
            <div class="form-group">
                <label for="confirm_password"><i class="fa-solid fa-shield-halved"></i> Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required autocomplete="new-password">
            </div>
            
            <button type="submit" class="btn-submit btn-primary">
                Register <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('login') }}">Log In</a></p>
        </div>
    </div>
</div>
{% endblock %}
